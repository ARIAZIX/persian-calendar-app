<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>تقویم فارسی | قیمت ارز و طلا</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;padding:12px;-webkit-overflow-scrolling:touch}
.container{max-width:480px;margin:0 auto}
.app-title{text-align:center;padding:16px 0 8px;font-size:1.3rem;font-weight:bold;color:#f0c060;text-shadow:0 2px 12px rgba(240,192,96,0.5)}
.app-subtitle{text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.4);margin-bottom:16px}
.card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px;margin-bottom:14px;backdrop-filter:blur(10px)}
.card-title{font-size:0.95rem;color:#88ccff;margin-bottom:14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:10px}
.today-section{text-align:center}
.today-persian{font-size:1.5rem;color:#f0c060;font-weight:bold;margin:8px 0 4px}
.today-gregorian{font-size:0.9rem;color:#aaa}
.today-time{font-size:1.2rem;color:#88ccff;margin-top:8px;font-weight:600}
.tabs{display:flex;background:rgba(0,0,0,0.2);border-radius:14px;padding:4px;gap:4px;margin-bottom:14px}
.tab{flex:1;padding:10px 4px;border:none;background:none;color:rgba(255,255,255,0.5);font-size:0.8rem;cursor:pointer;border-radius:10px;transition:all 0.25s;font-family:Tahoma,Arial,sans-serif}
.tab.active{background:linear-gradient(135deg,#f0c060,#e08020);color:#1a1a2e;font-weight:bold}
.panel{display:none}.panel.active{display:block}
label{display:block;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:6px}
input[type=number]{width:100%;padding:12px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px;direction:ltr;font-family:Tahoma,Arial,sans-serif;-webkit-appearance:none}
input:focus{border-color:#f0c060;box-shadow:0 0 0 3px rgba(240,192,96,0.12)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#f0c060,#e08020);border:none;border-radius:13px;color:#1a1a2e;font-size:0.95rem;font-weight:bold;cursor:pointer;font-family:Tahoma,Arial,sans-serif}
.btn:active{opacity:0.85}
.result{margin-top:12px;background:rgba(240,192,96,0.08);border:1px solid rgba(240,192,96,0.25);border-radius:13px;padding:14px;text-align:center;display:none}
.result-label{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:4px}
.result-value{font-size:1.25rem;color:#f0c060;font-weight:bold}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.price-item:last-child{border-bottom:none}
.price-left{display:flex;align-items:center;gap:10px}
.price-icon{font-size:1.6rem;min-width:36px;text-align:center}
.price-name{font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:2px}
.price-usd{font-size:1rem;font-weight:bold;color:#fff}
.price-right{text-align:left;min-width:90px}
.badge{font-size:0.72rem;padding:2px 8px;border-radius:8px;font-weight:bold;display:inline-block;margin-bottom:4px}
.up{background:rgba(0,220,100,0.15);color:#00dc64}
.down{background:rgba(255,60,60,0.15);color:#ff5050}
.neutral{background:rgba(136,204,255,0.15);color:#88ccff}
.price-toman{font-size:0.7rem;color:rgba(255,255,255,0.35);text-align:left}
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.last-upd{font-size:0.72rem;color:rgba(255,255,255,0.3)}
.refresh-btn{padding:7px 14px;background:rgba(136,204,255,0.1);border:1px solid rgba(136,204,255,0.25);border-radius:10px;color:#88ccff;font-size:0.78rem;cursor:pointer;font-family:Tahoma,Arial,sans-serif}
.loading{text-align:center;color:rgba(255,255,255,0.4);font-size:0.85rem;padding:14px 0}
.err-msg{text-align:center;color:#ff7070;font-size:0.8rem;padding:10px 0}
.footer{text-align:center;color:rgba(255,255,255,0.2);font-size:0.7rem;padding:8px 0 20px}
</style>
</head>
<body>
<div class="container">
<div class="app-title">&#10024; تقویم فارسی</div>
<div class="app-subtitle">تبدیل تاریخ و قیمت لحظه‌ای طلا، بیتکوین و نفت</div>

<div class="card">
<div class="card-title">&#128197; تاریخ امروز</div>
<div class="today-section">
<div class="today-persian" id="todayPersian">در حال بارگذاری...</div>
<div class="today-gregorian" id="todayGregorian"></div>
<div class="today-time" id="todayTime"></div>
</div>
</div>

<div class="card">
<div class="card-title">&#8644; تبدیل تاریخ</div>
<div class="tabs">
<button class="tab active" onclick="switchTab('j2g')">شمسی → میلادی</button>
<button class="tab" onclick="switchTab('g2j')">میلادی → شمسی</button>
</div>
<div class="panel active" id="panel-j2g">
<label>سال شمسی</label>
<input type="number" id="j_year" placeholder="1405" min="1300" max="1500">
<label>ماه (1 تا 12)</label>
<input type="number" id="j_month" placeholder="1" min="1" max="12">
<label>روز (1 تا 31)</label>
<input type="number" id="j_day" placeholder="1" min="1" max="31">
<button class="btn" onclick="convertJ2G()">تبدیل به میلادی</button>
<div class="result" id="result-j2g"><div class="result-label">معادل میلادی</div><div class="result-value" id="rv-j2g"></div></div>
</div>
<div class="panel" id="panel-g2j">
<label>سال میلادی</label>
<input type="number" id="g_year" placeholder="2026" min="1900" max="2100">
<label>ماه (1 تا 12)</label>
<input type="number" id="g_month" placeholder="1" min="1" max="12">
<label>روز (1 تا 31)</label>
<input type="number" id="g_day" placeholder="1" min="1" max="31">
<button class="btn" onclick="convertG2J()">تبدیل به شمسی</button>
<div class="result" id="result-g2j"><div class="result-label">معادل شمسی</div><div class="result-value" id="rv-g2j"></div></div>
</div>
</div>

<div class="card">
<div class="card-title">&#128200; قیمت لحظه‌ای</div>
<div id="prices-container"><div class="loading">در حال دریافت...</div></div>
<div class="refresh-row">
<span class="last-upd" id="last-upd">آخرین به‌روزرسانی: --</span>
<button class="refresh-btn" onclick="fetchPrices()">به‌روزرسانی &#8635;</button>
</div>
</div>

<div class="footer">&#169; 1405 تقویم فارسی</div>
</div>

<script>
const jM=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const gM=['January','February','March','April','May','June','July','August','September','October','November','December'];
const dN=['یک‌شنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];

function toJalali(gy,gm,gd){
let jdm=[31,31,31,31,31,31,30,30,30,30,30,29];
gy-=1600;gm--;gd--;
let gdn=365*gy+Math.floor((gy+3)/4)-Math.floor((gy+99)/100)+Math.floor((gy+399)/400);
let gdm=[31,29,31,30,31,30,31,31,30,31,30,31];
for(let i=0;i<gm;i++)gdn+=gdm[i];
if(gm>1&&((gy+1600)%4==0&&((gy+1600)%100!=0||(gy+1600)%400==0)))gdn++;
gdn+=gd;
let jdn=gdn-79;
let jnp=Math.floor(jdn/12053);jdn%=12053;
let jy=979+33*jnp+4*Math.floor(jdn/1461);
jdn%=1461;
if(jdn>=366){jy+=Math.floor((jdn-1)/365);jdn=(jdn-1)%365;}
let i=0;
for(;i<11&&jdn>=jdm[i];i++)jdn-=jdm[i];
return[jy,i+1,jdn+1];
}

function toGregorian(jy,jm,jd){
jy+=979;jm--;jd--;
let ep=(jy-979)*365+Math.floor((jy-979)/4)-Math.floor((jy-979)/100)+Math.floor((jy-979)/400);
for(let i=0;i<jm;i++)ep+=(i<6)?31:30;
if(jm===11)ep+=((jy%4==0&&jy%100!=0)||jy%400==0)?30:29;
else if(jm<11)ep+=jd;
else ep+=jd;
let g=new Date(622033+ep*86400000);
return[g.getFullYear(),g.getMonth()+1,g.getDate()];
}

function pad(n){return n<10?'0'+n:n;}

function updateClock(){
let now=new Date();
let[jy,jm,jd]=toJalali(now.getFullYear(),now.getMonth()+1,now.getDate());
document.getElementById('todayPersian').textContent=dN[now.getDay()]+' '+jd+' '+jM[jm-1]+' '+jy;
document.getElementById('todayGregorian').textContent=now.getDate()+' '+gM[now.getMonth()]+' '+now.getFullYear();
document.getElementById('todayTime').textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}
setInterval(updateClock,1000);updateClock();

function switchTab(t){
document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='j2g'?0:1)));
document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===(t==='j2g'?0:1)));
}

function convertJ2G(){
let y=+document.getElementById('j_year').value;
let m=+document.getElementById('j_month').value;
let d=+document.getElementById('j_day').value;
if(!y||!m||!d){alert('لطفاً همه فیلدها را پر کنید');return;}
let[gy,gm,gd]=toGregorian(y,m,d);
document.getElementById('result-j2g').style.display='block';
document.getElementById('rv-j2g').textContent=gd+' '+gM[gm-1]+' '+gy;
}

function convertG2J(){
let y=+document.getElementById('g_year').value;
let m=+document.getElementById('g_month').value;
let d=+document.getElementById('g_day').value;
if(!y||!m||!d){alert('لطفاً همه فیلدها را پر کنید');return;}
let[jy,jm,jd]=toJalali(y,m,d);
document.getElementById('result-g2j').style.display='block';
document.getElementById('rv-g2j').textContent=jd+' '+jM[jm-1]+' '+jy;
}

const IRR=62000;
function priceRow(icon,name,usd,ch,note){
let cls=ch>0?'up':ch<0?'down':'neutral';
let sign=ch>0?'+':'';
let chText=ch!==null?sign+ch.toFixed(2)+'%':'لحظه‌ای';
return `<div class="price-item"><div class="price-left"><div class="price-icon">${icon}</div><div><div class="price-name">${name}</div><div class="price-usd">$${usd.toLocaleString()}</div></div></div><div class="price-right"><span class="badge ${cls}">${chText}</span><div class="price-toman">${Math.round(usd*IRR).toLocaleString()} تومان</div></div></div>`;
}

async function fetchPrices(){
const c=document.getElementById('prices-container');
c.innerHTML='<div class="loading">در حال دریافت قیمت‌ها...</div>';
try{
let r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,gold,crude-oil&vs_currencies=usd&include_24hr_change=true&precision=2');
let d=await r.json();
let html='';
if(d.bitcoin)html+=priceRow('&#8383;','بیتکوین',d.bitcoin.usd,d.bitcoin.usd_24h_change,null);
if(d.gold)html+=priceRow('&#127775;','طلا (هر اونس)',d.gold.usd,d.gold.usd_24h_change,null);
if(d['crude-oil'])html+=priceRow('&#128674;','نفت خام',d['crude-oil'].usd,d['crude-oil'].usd_24h_change,null);
if(!html)throw new Error('no data');
c.innerHTML=html;
let now=new Date();
document.getElementById('last-upd').textContent='آخرین به‌روزرسانی: '+pad(now.getHours())+':'+pad(now.getMinutes());
}catch(e){
c.innerHTML='<div class="err-msg">خطا در دریافت. دوباره تلاش کنید &#8635;</div>';
}
}
fetchPrices();
setInterval(fetchPrices,60000);
</script>
</body>
</html>
