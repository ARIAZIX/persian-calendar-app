<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>تقویم فارسی | طلا بیتکوین نفت</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;padding:12px;-webkit-overflow-scrolling:touch}
.container{max-width:480px;margin:0 auto}
.app-title{text-align:center;padding:16px 0 8px;font-size:1.3rem;font-weight:bold;color:#f0c060;text-shadow:0 2px 12px rgba(240,192,96,0.5)}
.app-subtitle{text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.4);margin-bottom:16px}
.card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px;margin-bottom:14px;backdrop-filter:blur(10px)}
.card-title{font-size:0.95rem;color:#88ccff;margin-bottom:14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:10px}
.today-section{text-align:center}
.today-persian{font-size:1.5rem;color:#f0c060;font-weight:bold;margin:8px 0 4px}
.today-gregorian{font-size:0.9rem;color:#aaa}
.today-time{font-size:1.2rem;color:#88ccff;margin-top:8px;font-weight:600}
.tabs{display:flex;background:rgba(0,0,0,0.2);border-radius:14px;padding:4px;gap:4px;margin-bottom:14px}
.tab{flex:1;padding:10px 4px;border:none;background:none;color:rgba(255,255,255,0.5);font-size:0.8rem;cursor:pointer;border-radius:10px;transition:all 0.25s;font-family:Tahoma,Arial,sans-serif}
.tab.active{background:linear-gradient(135deg,#f0c060,#e08020);color:#1a1a2e;font-weight:bold}
.panel{display:none}.panel.active{display:block}
label{display:block;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:6px}
input[type=number]{width:100%;padding:12px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:0.95rem;outline:none;margin-bottom:12px;direction:ltr;font-family:Tahoma,Arial,sans-serif;-webkit-appearance:none}
input:focus{border-color:#f0c060;box-shadow:0 0 0 3px rgba(240,192,96,0.12)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#f0c060,#e08020);border:none;border-radius:13px;color:#1a1a2e;font-size:0.95rem;font-weight:bold;cursor:pointer;font-family:Tahoma,Arial,sans-serif}
.btn:active{opacity:0.85}
.result{margin-top:12px;background:rgba(240,192,96,0.08);border:1px solid rgba(240,192,96,0.25);border-radius:13px;padding:14px;text-align:center;display:none}
.result-label{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:4px}
.result-value{font-size:1.25rem;color:#f0c060;font-weight:bold}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.price-item:last-child{border-bottom:none}
.price-left{display:flex;align-items:center;gap:10px}
.price-icon{font-size:1.6rem;min-width:36px;text-align:center}
.price-name{font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:2px}
.price-usd{font-size:1rem;font-weight:bold;color:#fff}
.price-right{text-align:left;min-width:90px}
.badge{font-size:0.72rem;padding:2px 8px;border-radius:8px;font-weight:bold;display:inline-block;margin-bottom:4px}
.up{background:rgba(0,220,100,0.15);color:#00dc64}
.down{background:rgba(255,60,60,0.15);color:#ff5050}
.neutral{background:rgba(136,204,255,0.15);color:#88ccff}
.price-sub{font-size:0.7rem;color:rgba(255,255,255,0.35);text-align:left}
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.last-upd{font-size:0.72rem;color:rgba(255,255,255,0.3)}
.refresh-btn{padding:7px 14px;background:rgba(136,204,255,0.1);border:1px solid rgba(136,204,255,0.25);border-radius:10px;color:#88ccff;font-size:0.78rem;cursor:pointer;font-family:Tahoma,Arial,sans-serif}
.loading{text-align:center;color:rgba(255,255,255,0.4);font-size:0.85rem;padding:14px 0}
.err-msg{text-align:center;color:#ff7070;font-size:0.8rem;padding:10px 0}
.footer{text-align:center;color:rgba(255,255,255,0.2);font-size:0.7rem;padding:8px 0 20px}
</style>
</head>
<body>
<div class="container">
<div class="app-title">&#10024; تقویم فارسی</div>
<div class="app-subtitle">تبدیل تاریخ | قیمت لحظه‌ای طلا، بیتکوین و نفت</div>

<div class="card">
<div class="card-title">&#128197; تاریخ امروز</div>
<div class="today-section">
<div class="today-persian" id="todayP">در حال بارگذاری...</div>
<div class="today-gregorian" id="todayG"></div>
<div class="today-time" id="todayT"></div>
</div>
</div>

<div class="card">
<div class="card-title">&#8644; تبدیل تاریخ</div>
<div class="tabs">
<button class="tab active" onclick="sw('j2g')">شمسی → میلادی</button>
<button class="tab" onclick="sw('g2j')">میلادی → شمسی</button>
</div>
<div class="panel active" id="p-j2g">
<label>سال شمسی</label><input type="number" id="jy" placeholder="1405">
<label>ماه (1-12)</label><input type="number" id="jm" placeholder="1" min="1" max="12">
<label>روز (1-31)</label><input type="number" id="jd" placeholder="1" min="1" max="31">
<button class="btn" onclick="doJ2G()">تبدیل به میلادی</button>
<div class="result" id="r-j2g"><div class="result-label">معادل میلادی</div><div class="result-value" id="rv-j2g"></div></div>
</div>
<div class="panel" id="p-g2j">
<label>سال میلادی</label><input type="number" id="gy" placeholder="2026">
<label>ماه (1-12)</label><input type="number" id="gm" placeholder="1" min="1" max="12">
<label>روز (1-31)</label><input type="number" id="gd" placeholder="1" min="1" max="31">
<button class="btn" onclick="doG2J()">تبدیل به شمسی</button>
<div class="result" id="r-g2j"><div class="result-label">معادل شمسی</div><div class="result-value" id="rv-g2j"></div></div>
</div>
</div>

<div class="card">
<div class="card-title">&#128200; قیمت لحظه‌ای</div>
<div id="prices"><div class="loading">در حال دریافت...</div></div>
<div class="refresh-row">
<span class="last-upd" id="lupd">آخرین به‌روزرسانی: --</span>
<button class="refresh-btn" onclick="loadAll()">به‌روز &#8635;</button>
</div>
</div>

<div class="footer">&#169; 1405 تقویم فارسی</div>
</div>

<script>
const JM=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const GM=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DN=['یک‌شنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
function toJ(gy,gmo,gd){let jdm=[31,31,31,31,31,31,30,30,30,30,30,29];gy-=1600;gmo--;gd--;let gdn=365*gy+Math.floor((gy+3)/4)-Math.floor((gy+99)/100)+Math.floor((gy+399)/400);let gdm=[31,29,31,30,31,30,31,31,30,31,30,31];for(let i=0;i<gmo;i++)gdn+=gdm[i];if(gmo>1&&((gy+1600)%4==0&&((gy+1600)%100!=0||(gy+1600)%400==0)))gdn++;gdn+=gd;let jdn=gdn-79;let jnp=Math.floor(jdn/12053);jdn%=12053;let jy=979+33*jnp+4*Math.floor(jdn/1461);jdn%=1461;if(jdn>=366){jy+=Math.floor((jdn-1)/365);jdn=(jdn-1)%365;}let i=0;for(;i<11&&jdn>=jdm[i];i++)jdn-=jdm[i];return[jy,i+1,jdn+1];}
function toG(jy,jm,jd){jy+=979;jm--;jd--;let ep=(jy-979)*365+Math.floor((jy-979)/4)-Math.floor((jy-979)/100)+Math.floor((jy-979)/400);for(let i=0;i<jm;i++)ep+=(i<6)?31:30;ep+=jd;let g=new Date(622033+(ep+1)*86400000);return[g.getFullYear(),g.getMonth()+1,g.getDate()];}
function pad(n){return n<10?'0'+n:n;}
function tick(){let n=new Date();let[jy,jm,jd]=toJ(n.getFullYear(),n.getMonth()+1,n.getDate());document.getElementById('todayP').textContent=DN[n.getDay()]+' '+jd+' '+JM[jm-1]+' '+jy;document.getElementById('todayG').textContent=n.getDate()+' '+GM[n.getMonth()]+' '+n.getFullYear();document.getElementById('todayT').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());}
setInterval(tick,1000);tick();
function sw(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='j2g'?0:1)));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===(t==='j2g'?0:1)));}
function doJ2G(){let y=+document.getElementById('jy').value,m=+document.getElementById('jm').value,d=+document.getElementById('jd').value;if(!y||!m||!d)return alert('لطفاً همه فیلدها را وارد کنید');let[gy,gm,gd]=toG(y,m,d);document.getElementById('r-j2g').style.display='block';document.getElementById('rv-j2g').textContent=gd+' '+GM[gm-1]+' '+gy;}
function doG2J(){let y=+document.getElementById('gy').value,m=+document.getElementById('gm').value,d=+document.getElementById('gd').value;if(!y||!m||!d)return alert('لطفاً همه فیلدها را وارد کنید');let[jy,jm,jd]=toJ(y,m,d);document.getElementById('r-g2j').style.display='block';document.getElementById('rv-g2j').textContent=jd+' '+JM[jm-1]+' '+jy;}
const IRR=62000;
function row(icon,name,usd,ch,note){
let cls=ch>0?'up':ch<0?'down':'neutral';
let chStr=(ch>0?'+':'')+Number(ch).toFixed(2)+'%';
return `<div class="price-item"><div class="price-left"><div class="price-icon">${icon}</div><div><div class="price-name">${name}</div><div class="price-usd">$${Number(usd).toLocaleString('en-US',{maximumFractionDigits:2})}</div></div></div><div class="price-right"><span class="badge ${cls}">${chStr}</span><div class="price-sub">${note?note:Math.round(usd*IRR).toLocaleString('fa-IR')+' تومان'}</div></div></div>`;
}
async function loadAll(){
const el=document.getElementById('prices');
el.innerHTML='<div class="loading">در حال دریافت قیمت‌ها...</div>';
try{
const r1=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd&include_24hr_change=true');
const d1=await r1.json();
let html='';
const btc=d1.bitcoin;
if(btc&&btc.usd)html+=row('&#8383;','بیتکوین',btc.usd,btc.usd_24h_change||0,null);
const xau=d1['pax-gold'];
if(xau&&xau.usd)html+=row('&#127775;','طلا - PAX Gold (هر اونس)',xau.usd,xau.usd_24h_change||0,null);
let oilPrice=null,oilCh=0;
try{
const r2=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/CL%3DF?interval=1d&range=2d');
const d2=await r2.json();
const closes=d2.chart.result[0].indicators.quote[0].close;
if(closes&&closes.length>=2){oilPrice=closes[closes.length-1];const prev=closes[closes.length-2];oilCh=prev?((oilPrice-prev)/prev*100):0;}
}catch(e2){oilPrice=null;}
if(oilPrice){html+=row('&#128674;','نفت خام (WTI)',oilPrice,oilCh,null);}
else{html+=`<div class="price-item"><div class="price-left"><div class="price-icon">&#128674;</div><div><div class="price-name">نفت خام (WTI)</div><div class="price-usd" style="font-size:0.8rem;color:#aaa">داده موجود نیست (محدودیت CORS)</div></div></div><div class="price-right"><span class="badge neutral">~$62</span></div></div>`;}
if(!html)throw new Error('no data');
el.innerHTML=html;
const now=new Date();
document.getElementById('lupd').textContent='آخرین به‌روزرسانی: '+pad(now.getHours())+':'+pad(now.getMinutes());
}catch(e){
el.innerHTML='<div class="err-msg">خطا در دریافت. دوباره تلاش کنید.</div>';
}
}
loadAll();
setInterval(loadAll,90000);
</script>
</body>
</html>
